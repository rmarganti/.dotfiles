"$schema" = "https://starship.rs/config-schema.json"

"format" = '''
[┌](black) $hostname([\(](black)$git_branch$git_commit$git_state$git_metrics$git_status[\)](black) )$directory$fill[┐](black)
[└](black) $character
'''

[character]
error_symbol = '[\$](red)'
success_symbol = '[\$](white)'

[fill]
symbol = "─"

[hostname]
ssh_only = false
format = '[$ssh_symbol$hostname](blue) '
trim_at = '.companyname.com'
disabled = false


# Git branch
[git_branch]
always_show_remote = false
format = '[$branch(:$remote_branch)]($style)'
symbol = ' '
style = 'green'
truncation_length = 9223372036854775807       # 2^63 - 1
truncation_symbol = '…'
only_attached = false
ignore_branches = []
ignore_bare_repo = false
disabled = false

# Git commit
# [git_commit]
# commit_hash_length = 7
# format = '[\($hash$tag\)]($style) '
# style = 'bold green'
# only_detached = true
# tag_disabled = true
# tag_max_candidates = 0
# tag_symbol = ' 🏷  '
# disabled = false

# Git operation state
# [git_state]
# rebase = 'REBASING'
# merge = 'MERGING'
# revert = 'REVERTING'
# cherry_pick = 'CHERRY-PICKING'
# bisect = 'BISECTING'
# am = 'AM'
# am_or_rebase = 'AM/REBASE'
# style = 'bold yellow'
# format = '\([$state( $progress_current/$progress_total)]($style)\) '
# disabled = false

# Git diff metrics
# Disabled by default
# [git_metrics]
# added_style = 'bold green'
# deleted_style = 'bold red'
# only_nonzero_diffs = true
# format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
# disabled = true
# ignore_submodules = false

# Git status
[git_status]
format = '( [$all_status$ahead_behind]($style))'
conflicted = '='
ahead = '⇡'
behind = '⇣'
diverged = '⇕'
up_to_date = ''
untracked = '?'
stashed = '\$'
modified = '!'
staged = '+'
renamed = '»'
deleted = '✘'
typechanged = ''
style = 'purple'
ignore_submodules = false
# worktree_added = ''
# worktree_deleted = ''
# worktree_modified = ''
# worktree_typechanged = ''
# index_added = ''
# index_deleted = ''
# index_modified = ''
# index_typechanged = ''
disabled = false
# Use a Windows-native starship binary for WSL Windows paths; unset by default
# windows_starship = '/mnt/c/Users/username/scoop/apps/starship/current/starship.exe'
use_git_executable = false

[directory]
style = 'cyan'
