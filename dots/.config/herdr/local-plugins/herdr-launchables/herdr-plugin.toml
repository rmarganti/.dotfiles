id = "dots.herdr-launchables"
name = "Herdr Launchables"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Unified global and project launchables picker for Herdr."
platforms = ["linux", "macos"]

[[actions]]
id = "open"
title = "Open launchables"
contexts = ["workspace", "tab", "pane"]
command = ["node", "src/launchables.ts", "open"]

[[panes]]
id = "picker"
title = "Launchables"
placement = "overlay"
command = ["node", "src/launchables.ts", "picker"]
