id = "dots.quick-window"
name = "Quick Window"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Create context-aware tabs with predefined pane layouts from the existing tmux quick-window config."
platforms = ["linux", "macos"]

[[actions]]
id = "open"
title = "Open quick window"
contexts = ["workspace", "tab", "pane"]
command = ["node", "quick-window.mjs", "open"]

[[panes]]
id = "picker"
title = "Quick Window"
placement = "overlay"
command = ["node", "quick-window.mjs", "picker"]
