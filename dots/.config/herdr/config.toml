# Herdr config migrated from ~/.config/tmux.
# Custom tmux scripts/plugins are intentionally omitted for now; this focuses on
# tmux-like keybindings and the Neverforest palette used by Ghostty/Neovim.

onboarding = false

[theme]
name = "catppuccin"

[theme.custom]

accent = "#7a8a93"      # Main highlight: active pane borders, selected tabs/buttons, key hints.
panel_bg = "#20262a"    # Floating panels, popups, toasts, menus, bottom bars; "reset" inherits terminal bg.
surface0 = "#30383f"    # Selected rows, input fields, inactive tab fill, mobile cards/code badges.
surface1 = "#4b565c"    # Dragged/hover-ish rows and release-note code blocks.
surface_dim = "#2a3137" # Active workspace rows, separators, sidebar dividers, empty-pane border.
overlay0 = "#4b565c"    # Muted labels, unfocused pane borders/titles, unknown states, scrollbar tracks.
overlay1 = "#7a8a93"    # Brighter muted labels, secondary text, inactive tab text, scrollbar thumbs.
text = "#d3c6aa"        # Primary UI text in dialogs, sidebar, release notes, status messages.
subtext0 = "#a6b0a8"    # Subdued workspace names and detail metadata.
mauve = "#d699b6"       # Branch names when selected; special help/menu labels.
green = "#a2ccae"       # Idle/seen agent dots, copy success, git-ahead, current integrations.
yellow = "#dbbc7f"      # Working agent dots/spinners, config warnings, outdated integrations.
red = "#e67e80"         # Blocked/error/destructive UI, git-behind, needs-attention toasts.
blue = "#87b5c1"        # Finished/done toasts and mobile done summaries.
teal = "#aeccc6"        # Done-but-unseen agent dots.
peach = "#e6d1a7"       # Reserved for interrupted/warning states; currently not rendered in the UI.

[terminal]
# Match tmux split/new-window behavior: new panes/tabs follow the source pane cwd.
new_cwd = "follow"

[keys]
# tmux prefix: set -g prefix C-space
prefix = "ctrl+space"

# General / session-ish mappings
help = "prefix+?"
settings = "prefix+shift+s"
reload_config = "prefix+shift+r"
detach = "prefix+d"
rename_workspace = "prefix+r"
close_workspace = "prefix+shift+d"
workspace_picker = "prefix+w"
goto = "prefix+s"                  # matches tmux sesh binding

# Tabs: Herdr tabs map closest to tmux windows.
new_tab = "prefix+c"
rename_tab = ["prefix+shift+t", "prefix+comma"]
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
close_tab = "prefix+ampersand"

# Panes. Prefix h/j/k/l remain native Herdr focus bindings. Direct Ctrl-h/j/k/l
# are implemented by the local dots.herdr-navigator plugin below so they can
# forward into Vim/Neovim and fall back to Herdr at editor edges.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
swap_pane_left = "ctrl+alt+shift+h"
swap_pane_down = "ctrl+alt+shift+j"
swap_pane_up = "ctrl+alt+shift+k"
swap_pane_right = "ctrl+alt+shift+l"

split_vertical = ["prefix+|", "prefix+backslash"]
split_horizontal = ["prefix+minus", "prefix+_"]
zoom = "prefix+z"
copy_mode = "prefix+["
resize_mode = ""

navigate_pane_left = ""
navigate_pane_down = ""
navigate_pane_up = ""
navigate_pane_right = ""
navigate_workspace_down = "j"
navigate_workspace_up = "k"

# Worktrees
new_workspace = "prefix+shift+n"
new_worktree = "prefix+shift+w"
open_worktree = "prefix+shift+o"
remove_worktree = "prefix+shift+x"

switch_workspace = "prefix+alt+1..9"
focus_agent = "prefix+ctrl+1..9"
edit_scrollback = ""
rename_pane = ""
last_pane = ""
close_pane = "prefix+x"
toggle_sidebar = "prefix+b"
open_notification_target = ""

[ui]
mouse_capture = true
right_click_passthrough_modifier = "ctrl"
mouse_scroll_lines = 3
# tmux new-window does not prompt for a name.
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = false
agent_panel_scope = "all"
accent = "#9da9a0"

[ui.toast]
delivery = "off"

[session]
resume_agents_on_restore = true

[[keys.command]]
key = "prefix+="
type = "plugin_action"
command = "dots.herdr-equalize-splits.equalize"
description = "equalize splits"

[[keys.command]]
key = "ctrl+shift+h"
type = "shell"
command = "herdr pane resize --direction left --amount 0.05 --current"
description = "resize pane left"

[[keys.command]]
key = "ctrl+shift+j"
type = "shell"
command = "herdr pane resize --direction down --amount 0.05 --current"
description = "resize pane down"

[[keys.command]]
key = "ctrl+shift+k"
type = "shell"
command = "herdr pane resize --direction up --amount 0.05 --current"
description = "resize pane up"

[[keys.command]]
key = "ctrl+shift+l"
type = "shell"
command = "herdr pane resize --direction right --amount 0.05 --current"
description = "resize pane right"

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "dots.herdr-navigator.left"
description = "smart navigate left"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "dots.herdr-navigator.down"
description = "smart navigate down"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "dots.herdr-navigator.up"
description = "smart navigate up"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "dots.herdr-navigator.right"
description = "smart navigate right"

[[keys.command]]
key = "prefix+ctrl+h"
type = "plugin_action"
command = "dots.herdr-navigator.send-left"
description = "send literal ctrl+h"

[[keys.command]]
key = "prefix+ctrl+j"
type = "plugin_action"
command = "dots.herdr-navigator.send-down"
description = "send literal ctrl+j"

[[keys.command]]
key = "prefix+ctrl+k"
type = "plugin_action"
command = "dots.herdr-navigator.send-up"
description = "send literal ctrl+k"

[[keys.command]]
key = "prefix+ctrl+l"
type = "plugin_action"
command = "dots.herdr-navigator.send-right"
description = "send literal ctrl+l"

[[keys.command]]
key = "prefix+shift+c"
type = "plugin_action"
command = "dots.herdr-launchables.open"
description = "open launchables"

[[keys.command]]
key = "prefix+q"
type = "plugin_action"
command = "rmarganti.herdr-pluck.pluck"
description = "pluck visible token"
